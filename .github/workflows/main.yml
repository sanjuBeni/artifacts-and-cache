name: Artifact vs Cache

on: 
  push:
    branches: 
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7.0.0

      - name: NodeJs Set-up
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build App
        run: npm run build

      - name: Upload build on Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: React App Build
          path: dist
        
